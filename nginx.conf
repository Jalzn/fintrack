events {}

http {
    # Railway's internal DNS resolver — required for runtime hostname resolution
    # and correct handling of IPv6 private network addresses
    resolver 127.0.0.11 ipv6=off valid=30s;

    server {
        listen 80;

        location /api/ {
            # Use a variable so nginx resolves the hostname at request time,
            # not at startup. This prevents startup failures when the upstream
            # service is not yet reachable and avoids IPv6/IPv4 ambiguity.
            set $backend_upstream http://${BACKEND_HOST}:5000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            set $frontend_upstream http://${FRONTEND_HOST}:3000;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
